<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>RollCall</title>
    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
    <script>
      // Polyfill import.meta.env for Metro web bundle (used by Zustand)
      if (typeof globalThis.importMetaEnv === 'undefined') {
        try {
          // Define import.meta if not in module context
          Object.defineProperty(globalThis, '__importMetaEnv', {
            value: { MODE: 'development' },
            writable: true,
          });
        } catch(e) {}
      }
    </script>
  </head>
  <body>
    <noscript>
      <p>RollCall requires JavaScript to run.</p>
    </noscript>
    <div id="root"></div>
  </body>
</html>
